<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Berroa Studio | Sustainable Fashion & Lifestyle</title>
    
    <!-- OpenGraph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://berroastudio.com/" />
    <meta property="og:title" content="Berroa Studio — Sustainable fashion and lifestyle goods" />
    <meta property="og:description" content="Shop our curated collection of clothing, home goods, and accessories. Sustainable fashion from the heart." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Berroa Studio — Sustainable fashion and lifestyle" />
    <meta property="twitter:description" content="Sustainable fashion from the heart." />
    <meta property="twitter:image" content="/og-image.png" />

    <!-- Organization Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "Berroa Studio",
        "url": "https://berroastudio.com",
        "logo": "https://berroastudio.com/favicon.png",
        "image": "https://berroastudio.com/og-image.png",
        "description": "Premium lifestyle and custom fashion studio.",
        "telephone": "+18293410714",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Distrito Nacional",
          "addressLocality": "Santo Domingo",
          "addressCountry": "DO"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": 18.4861,
          "longitude": -69.9312
        },
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
            "opens": "09:00",
            "closes": "18:00"
          }
        ],
        "sameAs": [
          "https://instagram.com/berroastudio",
          "https://facebook.com/berroastudio"
        ]
      }
    </script>

    <!-- WebSite Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Berroa Studio",
        "url": "https://berroastudio.com",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://berroastudio.com/?s={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <!-- Cloudflare Turnstile -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

  </body>
</html>
